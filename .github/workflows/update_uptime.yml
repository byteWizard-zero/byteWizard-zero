name: Update Uptime

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

jobs:
  update-uptime:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Uptime Update Script
        run: python .github/scripts/update_uptime.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md GITHUB_PROFILE_README.md 2>/dev/null || true
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: update mainframe uptime telemetry"
            git push
          else
            echo "No changes in uptime telemetry."
          fi
